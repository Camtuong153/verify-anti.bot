<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảo Mật Anti-Bot Verification</title>
  
  <!-- hCaptcha Script -->
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>

  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e6edf3;
    }

    /* Windows 7 Aero Dark Glass Card */
    .aero-card {
      background: rgba(22, 27, 34, 0.65);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.125);
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .card-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .card-header h2 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .card-header p {
      font-size: 13px;
      color: #8b949e;
      margin-top: 6px;
    }

    /* Input & Form Control */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #c9d1d9;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(13, 17, 23, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
    }

    .otp-input {
      text-align: center;
      letter-spacing: 10px;
      font-size: 24px !important;
      font-family: monospace;
    }

    /* hCaptcha Wrapper */
    .captcha-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    /* Aero Glass Button */
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(180deg, rgba(56, 139, 253, 0.8) 0%, rgba(31, 111, 235, 0.8) 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 12px rgba(31, 111, 235, 0.3);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: linear-gradient(180deg, rgba(79, 153, 255, 0.9) 0%, rgba(38, 120, 246, 0.9) 100%);
      box-shadow: 0 6px 16px rgba(31, 111, 235, 0.5);
    }

    /* State Switch Logic */
    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    /* Notifications */
    .message {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 16px;
      text-align: center;
      display: none;
    }

    .message.error {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid rgba(248, 81, 73, 0.4);
      color: #f85149;
      display: block;
    }

    .message.success {
      background: rgba(46, 160, 67, 0.15);
      border: 1px solid rgba(46, 160, 67, 0.4);
      color: #3fb950;
      display: block;
    }
  </style>
</head>
<body>

  <div class="aero-card">
    
    <!-- Thông báo lỗi / thành công -->
    <div id="msgBox" class="message"></div>

    <!-- BƯỚC 1: NHẬP EMAIL & CAPTCHA -->
    <div id="step1" class="step active">
      <div class="card-header">
        <h2>Xác Minh Bảo Mật</h2>
        <p>Vui lòng xác minh bạn không phải là máy tính</p>
      </div>

      <form id="formStep1">
        <div class="form-group">
          <label for="email">Địa chỉ Email</label>
          <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="captcha-wrapper">
          <!-- Thay YOUR_HCAPTCHA_SITE_KEY bằng Sitekey của bạn -->
          <div class="h-captcha" data-sitekey="a5384e34-3b64-4534-b242-9300ca5c91f2"></div>
        </div>

        <button type="submit" id="btnSendOtp" class="btn">Gửi Mã Xác Thực</button>
      </form>
    </div>

    <!-- BƯỚC 2: NHẬP MÃ OTP -->
    <div id="step2" class="step">
      <div class="card-header">
        <h2>Nhập Mã OTP</h2>
        <p>Mã xác minh đã được gửi đến email của bạn</p>
      </div>

      <form id="formStep2">
        <div class="form-group">
          <label for="otp">Mã 6 chữ số</label>
          <input type="text" id="otp" class="otp-input" maxlength="6" placeholder="******" required>
        </div>

        <button type="submit" id="btnVerifyOtp" class="btn">Xác Nhận & Truy Cập</button>
      </form>
    </div>

  </div>

  <script>
    // Điền URL Cloudflare Worker của bạn vào đây
    const WORKER_URL = "https://your-worker-subdomain.workers.dev";

    let userEmail = "";

    function showMessage(text, isError = true) {
      const msgBox = document.getElementById("msgBox");
      msgBox.innerText = text;
      msgBox.className = "message " + (isError ? "error" : "success");
    }

    // Xử lý gửi Form Bước 1
    document.getElementById("formStep1").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("email").value;
      const hcaptchaResp = hcaptcha.getResponse();

      if (!hcaptchaResp) {
        showMessage("Vui lòng tích chọn xác minh hCaptcha!");
        return;
      }

      userEmail = email;
      const btn = document.getElementById("btnSendOtp");
      btn.innerText = "Đang xử lý...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/send-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, captchaToken: hcaptchaResp })
        });

        const data = await res.json();

        if (res.ok) {
          showMessage("Mã OTP đã được gửi! Vui lòng kiểm tra hộp thư.", false);
          document.getElementById("step1").classList.remove("active");
          document.getElementById("step2").classList.add("active");
        } else {
          showMessage(data.error || "Gửi thất bại.");
          hcaptcha.reset();
        }
      } catch (err) {
        showMessage("Lỗi kết nối Server.");
        hcaptcha.reset();
      } finally {
        btn.innerText = "Gửi Mã Xác Thực";
        btn.disabled = false;
      }
    });

    // Xử lý gửi Form Bước 2
    document.getElementById("formStep2").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const otp = document.getElementById("otp").value;
      const btn = document.getElementById("btnVerifyOtp");
      
      btn.innerText = "Đang xác thực...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail, otp })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showMessage("Xác thực thành công! Đang chuyển hướng...", false);
          setTimeout(() => {
            window.location.href = data.redirectUrl || "https://yourwebsite.com/dashboard";
          }, 1500);
        } else {
          showMessage(data.error || "Mã OTP không đúng.");
        }
      } catch (err) {
        showMessage("Lỗi kết nối Server.");
      } finally {
        btn.innerText = "Xác Nhận & Truy Cập";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
