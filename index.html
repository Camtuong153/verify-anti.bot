<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác Minh Bảo Mật OTP</title>
  <!-- Thư viện hCaptcha -->
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #1e293b; padding: 24px; border-radius: 12px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); text-align: center; }
    h2 { margin-bottom: 8px; font-size: 1.25rem; }
    p { color: #94a3b8; font-size: 0.875rem; margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; font-size: 0.95rem; }
    button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #2563eb; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.95rem; margin-top: 10px; }
    button:disabled { background: #64748b; cursor: not-allowed; }
    .captcha-container { display: flex; justify-content: center; margin-bottom: 12px; min-height: 78px; }
    .step { display: none; }
    .step.active { display: block; }
    .message { margin-top: 12px; font-size: 0.85rem; padding: 10px; border-radius: 6px; word-break: break-all; }
    .error { background: #7f1d1d; color: #fca5a5; }
    .success { background: #14532d; color: #86efac; }
  </style>
</head>
<body>

  <div class="card">
    <!-- BƯỚC 1: EMAIL + CAPTCHA -->
    <div id="step1" class="step active">
      <h2>Xác Minh Bảo Mật</h2>
      <p>Nhập email và giải captcha để nhận mã OTP</p>
      <form id="formStep1">
        <input type="email" id="email" placeholder="Địa chỉ Email của bạn" required />
        
        <div class="captcha-container">
          <!-- THAY SITE KEY HCAPTCHA CỦA BẠN VÀO DÒNG DƯỚI -->
          <div class="h-captcha" data-sitekey="d076288e-14b6-4e8e-87ae-8c6eae223688"></div>
        </div>

        <button type="submit" id="btnSendOtp">Gửi Mã Xác Thực</button>
      </form>
    </div>

    <!-- BƯỚC 2: NHẬP OTP -->
    <div id="step2" class="step">
      <h2>Nhập Mã Xác Thực</h2>
      <p>Mã OTP (hiệu lực 15 phút) đã được gửi đến email</p>
      <form id="formStep2">
        <input type="text" id="otp" placeholder="Nhập mã OTP (6 số)" required maxlength="6" />
        <button type="submit" id="btnVerifyOtp">Xác Nhận & Tạo Token</button>
      </form>
    </div>

    <div id="msgBox" class="message" style="display:none;"></div>
  </div>

  <!-- F12 Debug trên điện thoại -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <script>
    const WORKER_URL = "https://withered-morning-f487.cammanhtuong.workers.dev";
    let userEmail = "";

    function showMessage(text, isError = true) {
      const msgBox = document.getElementById("msgBox");
      msgBox.innerText = text;
      msgBox.className = "message " + (isError ? "error" : "success");
      msgBox.style.display = "block";
    }

    function clearMessage() {
      document.getElementById("msgBox").style.display = "none";
    }

    // 1. Gửi OTP
    document.getElementById("formStep1").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const email = document.getElementById("email").value.trim();
      const captchaResponse = hcaptcha.getResponse();

      if (!captchaResponse) {
        showMessage("Vui lòng tích chọn ô hCaptcha!");
        return;
      }

      userEmail = email;
      const btn = document.getElementById("btnSendOtp");
      btn.innerText = "Đang gửi email...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/send-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, captchaToken: captchaResponse })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Gửi OTP thành công! Kiểm tra hòm thư của bạn.");
          document.getElementById("step1").classList.remove("active");
          document.getElementById("step2").classList.add("active");
        } else {
          alert("Lỗi: " + (data.error || "Không thể gửi OTP"));
          showMessage(data.error || "Gửi thất bại");
          hcaptcha.reset();
        }
      } catch (err) {
        alert("Lỗi kết nối: " + err.message);
        hcaptcha.reset();
      } finally {
        btn.innerText = "Gửi Mã Xác Thực";
        btn.disabled = false;
      }
    });

    // 2. Xác minh OTP & Nhận Encrypted Token
    document.getElementById("formStep2").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const otp = document.getElementById("otp").value.trim();
      const btn = document.getElementById("btnVerifyOtp");

      btn.innerText = "Đang kiểm tra...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail, otp: otp })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          alert("Xác thực thành công!");
          console.log("Encrypted Token nhận được:", data.token);
          
          // Chuyển hướng sang Web khác kèm Encrypted Token trên URL
          // Thay 'https://web-thu-hai.com/sso' bằng URL web thứ hai của bạn
          const redirectTarget = "000" + encodeURIComponent(data.token);
          window.location.href = redirectTarget;

        } else {
          alert("Lỗi OTP: " + (data.error || "Mã không đúng"));
          showMessage(data.error || "Mã OTP không chính xác");
        }
      } catch (err) {
        alert("Lỗi kết nối: " + err.message);
      } finally {
        btn.innerText = "Xác Nhận & Tạo Token";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
