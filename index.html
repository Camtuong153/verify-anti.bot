<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác Minh Bảo Mật</title>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
    h2 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.5rem;
    }
    p.subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.875rem;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 6px;
      color: #cbd5e1;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #475569;
      background-color: #0f172a;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    input:focus {
      border-color: #3b82f6;
    }
    .h-captcha {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background-color: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:disabled {
      background-color: #64748b;
      cursor: not-allowed;
    }
    .message {
      padding: 10px;
      border-radius: 6px;
      font-size: 0.875rem;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }
    .message.error {
      background-color: #7f1d1d;
      color: #fca5a5;
      display: block;
    }
    .message.success {
      background-color: #14532d;
      color: #86efac;
      display: block;
    }
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }
  </style>
</head>
<body>

  <div class="card">
    <div id="msgBox" class="message"></div>

    <!-- Bước 1: Nhập Email & Captcha -->
    <div id="step1" class="step active">
      <h2>Xác Minh Bảo Mật</h2>
      <p class="subtitle">Vui lòng xác minh bạn không phải là máy tính</p>
      
      <form id="formStep1">
        <div class="form-group">
          <label for="email">Địa chỉ Email</label>
          <input type="email" id="email" placeholder="example@domain.com" required>
        </div>

        <div class="h-captcha" data-sitekey="10000000-ffff-ffff-ffff-000000000001"></div>

        <button type="submit" id="btnSendOtp">Gửi Mã Xác Thực</button>
      </form>
    </div>

    <!-- Bước 2: Nhập mã OTP -->
    <div id="step2" class="step">
      <h2>Nhập Mã Xác Thực</h2>
      <p class="subtitle">Mã OTP gồm 6 chữ số đã được gửi đến email của bạn</p>
      
      <form id="formStep2">
        <div class="form-group">
          <label for="otp">Mã OTP</label>
          <input type="text" id="otp" maxlength="6" placeholder="123456" required style="text-align: center; letter-spacing: 4px; font-weight: bold;">
        </div>

        <button type="submit" id="btnVerifyOtp">Xác Nhận & Truy Cập</button>
      </form>
    </div>
  </div>

  <script>
    // ⚠️ LƯU Ý: Thay URL Cloudflare Worker của bạn vào đây
    const WORKER_URL = "https://your-worker-name.subdomain.workers.dev";

    let userEmail = "";

    function showMessage(text, isError = true) {
      const msgBox = document.getElementById("msgBox");
      msgBox.innerText = text;
      msgBox.className = "message " + (isError ? "error" : "success");
    }

    function clearMessage() {
      const msgBox = document.getElementById("msgBox");
      msgBox.style.display = "none";
    }

    // Xử lý gửi Form Bước 1
    document.getElementById("formStep1").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const email = document.getElementById("email").value.trim();
      const hcaptchaResp = hcaptcha.getResponse();

      if (!hcaptchaResp) {
        showMessage("Vui lòng tích chọn xác minh hCaptcha!");
        return;
      }

      userEmail = email;
      const btn = document.getElementById("btnSendOtp");
      btn.innerText = "Đang xử lý...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/send-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, captchaToken: hcaptchaResp })
        });

        const data = await res.json();

        if (res.ok) {
          showMessage("Mã OTP đã được gửi! Vui lòng kiểm tra hộp thư.", false);
          document.getElementById("step1").classList.remove("active");
          document.getElementById("step2").classList.add("active");
        } else {
          showMessage(data.error || "Gửi mã thất bại. Vui lòng thử lại!");
          if (typeof hcaptcha !== 'undefined') hcaptcha.reset();
        }
      } catch (err) {
        showMessage("Không thể kết nối đến máy chủ xác thực.");
        if (typeof hcaptcha !== 'undefined') hcaptcha.reset();
      } finally {
        btn.innerText = "Gửi Mã Xác Thực";
        btn.disabled = false;
      }
    });

    // Xử lý gửi Form Bước 2
    document.getElementById("formStep2").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const otp = document.getElementById("otp").value.trim();
      const btn = document.getElementById("btnVerifyOtp");

      btn.innerText = "Đang xác thực...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail, otp })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showMessage("Xác thực thành công! Đang chuyển hướng...", false);
          setTimeout(() => {
            window.location.href = data.redirectUrl || "https://google.com";
          }, 1500);
        } else {
          showMessage(data.error || "Mã OTP không hợp lệ hoặc đã hết hạn.");
        }
      } catch (err) {
        showMessage("Không thể kết nối đến máy chủ xác thực.");
      } finally {
        btn.innerText = "Xác Nhận & Truy Cập";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
