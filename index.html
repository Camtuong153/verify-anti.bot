<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác thực OTP Anti-Bot</title>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; }
    .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:disabled { background-color: #aaa; cursor: not-allowed; }
    .h-captcha { margin: 15px 0; display: flex; justify-content: center; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Xác thực Email</h2>
    
    <input type="email" id="emailInput" placeholder="Nhập địa chỉ Email..." required />

    <div class="h-captcha" data-sitekey="d076288e-14b6-4e8e-87ae-8c6eae223688"></div>

    <button id="sendBtn" onclick="requestOTP()">Gửi mã OTP</button>

    <div id="otpSection" style="display:none; margin-top: 20px;">
      <p style="font-size: 13px; color: #666;">Mã OTP có hiệu lực trong 30 phút.</p>
      <input type="text" id="otpInput" placeholder="Nhập 6 số OTP" maxlength="6" />
      <button onclick="verifyOTP()">Xác nhận OTP</button>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://withered-morning-f487.cammanhtuong.workers.dev";

    // 1. GỬI MÃ OTP
    async function requestOTP() {
      const email = document.getElementById("emailInput").value.trim();
      const captchaToken = window.hcaptcha ? hcaptcha.getResponse() : "";

      if (!email) {
        alert("Vui lòng nhập Email!");
        return;
      }

      const sendBtn = document.getElementById("sendBtn");
      sendBtn.disabled = true;
      sendBtn.innerText = "Đang gửi...";

      try {
        const res = await fetch(`${WORKER_URL}/send-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, captchaToken })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          alert("Mã OTP đã được gửi về email của bạn!");
          // Lưu Token mã hóa OTP vào bộ nhớ trình duyệt
          sessionStorage.setItem("otpToken", data.otpToken);
          document.getElementById("otpSection").style.display = "block";
        } else {
          alert("Lỗi từ máy chủ: " + data.message);
        }
      } catch (err) {
        alert("Lỗi kết nối: " + err.message);
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = "Gửi mã OTP";
        if (window.hcaptcha) hcaptcha.reset();
      }
    }

    // 2. XÁC NHẬN OTP
    async function verifyOTP() {
      const email = document.getElementById("emailInput").value.trim();
      const otp = document.getElementById("otpInput").value.trim();
      const otpToken = sessionStorage.getItem("otpToken");

      if (!otp) {
        alert("Vui lòng nhập mã OTP!");
        return;
      }

      if (!otpToken) {
        alert("Thiếu token xác thực! Vui lòng bấm gửi lại mã OTP.");
        return;
      }

      try {
        const res = await fetch(`${WORKER_URL}/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp, otpToken })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          alert("🎉 Xác thực thành công!");
          sessionStorage.removeItem("otpToken");
        } else {
          alert("❌ Xác thực thất bại: " + data.message);
        }
      } catch (err) {
        alert("Lỗi hệ thống: " + err.message);
      }
    }
  </script>
</body>
</html>
