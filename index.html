<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác Minh OTP</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #1e293b; padding: 24px; border-radius: 12px; width: 100%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); text-align: center; }
    h2 { margin-bottom: 8px; font-size: 1.25rem; }
    p { color: #94a3b8; font-size: 0.875rem; margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 10px; border-radius: 6px; border: none; background: #2563eb; color: #fff; font-weight: bold; cursor: pointer; }
    button:disabled { background: #64748b; }
    .step { display: none; }
    .step.active { display: block; }
    .message { margin-top: 12px; font-size: 0.85rem; padding: 8px; border-radius: 4px; }
    .error { background: #7f1d1d; color: #fca5a5; }
    .success { background: #14532d; color: #86efac; }
  </style>
</head>
<body>

  <div class="card">
    <!-- Bước 1: Nhập Email -->
    <div id="step1" class="step active">
      <h2>Xác Minh Bảo Mật</h2>
      <p>Nhập email của bạn để nhận mã OTP xác minh</p>
      <form id="formStep1">
        <input type="email" id="email" placeholder="Địa chỉ Email" required />
        <button type="submit" id="btnSendOtp">Gửi Mã Xác Thực</button>
      </form>
    </div>

    <!-- Bước 2: Nhập OTP -->
    <div id="step2" class="step">
      <h2>Nhập Mã OTP</h2>
      <p>Mã xác minh đã được gửi đến email của bạn</p>
      <form id="formStep2">
        <input type="text" id="otp" placeholder="Nhập mã OTP (6 số)" required maxlength="6" />
        <button type="submit" id="btnVerifyOtp">Xác Nhận & Truy Cập</button>
      </form>
    </div>

    <div id="msgBox" class="message" style="display:none;"></div>
  </div>

  <!-- Tích hợp F12 Eruda hỗ trợ debug trực tiếp trên Cốc Cốc Mobile -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <script>
    const WORKER_URL = "https://withered-morning-f487.cammanhtuong.workers.dev";
    let userEmail = "";

    function showMessage(text, isError = true) {
      const msgBox = document.getElementById("msgBox");
      msgBox.innerText = text;
      msgBox.className = "message " + (isError ? "error" : "success");
      msgBox.style.display = "block";
    }

    function clearMessage() {
      const msgBox = document.getElementById("msgBox");
      msgBox.style.display = "none";
    }

    // Bước 1: Gửi OTP
    document.getElementById("formStep1").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const email = document.getElementById("email").value.trim();
      userEmail = email;

      const btn = document.getElementById("btnSendOtp");
      btn.innerText = "Đang gửi email...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/send-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Gửi thành công! Đang chuyển sang nhập OTP.");
          document.getElementById("step1").classList.remove("active");
          document.getElementById("step2").classList.add("active");
        } else {
          alert("Lỗi từ Worker: " + (data.error || JSON.stringify(data)));
          showMessage(data.error || "Gửi mã thất bại.");
        }
      } catch (err) {
        alert("Lỗi kết nối (Fetch error): " + err.message);
        showMessage("Không thể kết nối đến Cloudflare Worker.");
      } finally {
        btn.innerText = "Gửi Mã Xác Thực";
        btn.disabled = false;
      }
    });

    // Bước 2: Xác minh OTP
    document.getElementById("formStep2").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const otp = document.getElementById("otp").value.trim();
      const btn = document.getElementById("btnVerifyOtp");

      btn.innerText = "Đang kiểm tra...";
      btn.disabled = true;

      try {
        const res = await fetch(`${WORKER_URL}/api/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail, otp })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          alert("Xác thực thành công!");
          window.location.href = "https://google.com"; // Trang đích sau khi hoàn tất
        } else {
          alert("Lỗi OTP: " + (data.error || "Mã không đúng"));
          showMessage(data.error || "Mã OTP không chính xác.");
        }
      } catch (err) {
        alert("Lỗi kết nối xác minh: " + err.message);
      } finally {
        btn.innerText = "Xác Nhận & Truy Cập";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
